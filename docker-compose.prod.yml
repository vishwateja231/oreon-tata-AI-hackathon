version: "3.9"

# Oracle VM.Standard.E2.1.Micro — 1 CPU / 1 GB RAM
# Services: backend (FastAPI) + nginx only.
# PostgreSQL → Supabase  |  Redis → Upstash  |  Frontend → Vercel

services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: oreon-backend:latest
    container_name: oreon_backend
    restart: always
    env_file:
      - .env
    expose:
      - "8000"           # internal only — nginx proxies, not exposed to host
    volumes:
      - backend_data:/app/data          # seed JSON + embedded Qdrant index
    deploy:
      resources:
        limits:
          memory: 768M   # ~75 % of 1 GB; leaves ~256 MB for OS + nginx
        reservations:
          memory: 256M
    command: >
      sh -c "alembic upgrade head &&
             python -m app.utils.data_loader &&
             uvicorn app.main:app
               --host 0.0.0.0
               --port 8000
               --workers 1
               --timeout-keep-alive 5
               --log-level warning"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # allow time for alembic + data_loader on cold start

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: oreon_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  backend_data:
    driver: local
