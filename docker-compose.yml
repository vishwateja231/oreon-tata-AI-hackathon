version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oreon_backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    command: >
      sh -c "alembic upgrade head &&
             python -m app.utils.data_loader &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oreon_frontend
    restart: unless-stopped
    environment:
      # Tell the frontend that the API is at /api/v1 relative to the host
      - VITE_API_URL=/api/v1
    ports:
      - "8080:8080"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: oreon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
