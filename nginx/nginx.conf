events {
    worker_connections 256;   # low-memory Oracle VM — no need for 1024
    worker_processes 1;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  30;   # shorter timeout to free memory faster

    # Suppress access logs — saves disk I/O on the micro VM
    access_log  off;
    error_log   /var/log/nginx/error.log warn;

    # Tight buffer sizes for 1 GB RAM
    client_body_buffer_size   16k;
    client_max_body_size      10m;   # allow audio uploads for voice agent
    proxy_buffer_size         16k;
    proxy_buffers             4 16k;

    # Backend FastAPI upstream
    upstream backend_api {
        server backend:8000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;   # respond to any hostname / bare IP

        # ── API, Swagger docs, health probes ────────────────────────────────
        location ~ ^/(api|docs|redoc|openapi\.json|health|diagnostics) {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE (Server-Sent Events) — OREON real-time telemetry stream
            proxy_set_header   Connection '';
            chunked_transfer_encoding off;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;   # keep SSE connections alive
        }

        # ── Root — simple liveness acknowledgement ───────────────────────────
        location = / {
            add_header Content-Type text/plain;
            return 200 "OREON backend OK\n";
        }

        # ── Everything else → 404 ────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
